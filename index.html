<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitLog">
  <title>FitLog</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#0f0f13;--bg2:#1a1a22;--bg3:#22222e;
      --accent:#7c6bff;--success:#4ecdc4;--warn:#ffd166;--danger:#ff6b6b;
      --text:#f0eeff;--text2:#9b97b8;
      --border:rgba(124,107,255,0.18);--card:#1e1e2a;
      --radius:14px;--radius-sm:8px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;}
    .app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;}
    .topbar{padding:calc(14px + env(safe-area-inset-top)) 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .topbar-row{display:flex;align-items:center;justify-content:space-between;}
    .topbar-title{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
    .mode-toggle{display:flex;background:var(--bg3);border-radius:20px;padding:3px;gap:2px;}
    .mode-btn{font-size:12px;font-weight:700;padding:6px 14px;border-radius:16px;border:none;cursor:pointer;transition:all 0.2s;color:var(--text2);background:transparent;}
    .mode-btn.active{background:var(--accent);color:#fff;}
    .screens{flex:1;overflow:hidden;position:relative;}
    .screen{display:none;position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(80px + env(safe-area-inset-bottom));flex-direction:column;gap:12px;}
    .screen.active{display:flex;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;flex-shrink:0;}
    .card-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px;}
    .member-chips{display:flex;gap:8px;flex-wrap:wrap;min-height:32px;}
    .chip{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);cursor:pointer;color:var(--text2);background:transparent;transition:all 0.2s;white-space:nowrap;}
    .chip.selected{border-color:var(--accent);color:var(--accent);background:rgba(124,107,255,0.1);}
    .add-member-row{display:flex;gap:8px;margin-top:10px;}
    .text-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:9px 12px;outline:none;font-family:inherit;}
    .text-input:focus{border-color:var(--accent);}
    .btn-sm{padding:9px 16px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .btn-sm:active{background:#6a5ae0;}
    .upload-area{border:1.5px dashed rgba(124,107,255,0.35);border-radius:var(--radius);padding:28px 16px;text-align:center;cursor:pointer;position:relative;overflow:hidden;}
    .upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .upload-icon{width:48px;height:48px;border-radius:50%;background:rgba(124,107,255,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
    .upload-icon svg{width:24px;height:24px;stroke:var(--accent);}
    .upload-text{font-size:14px;font-weight:700;color:var(--text);}
    .upload-sub{font-size:12px;color:var(--text2);margin-top:4px;}
    .preview-img{width:100%;border-radius:var(--radius-sm);max-height:200px;object-fit:cover;margin-top:10px;display:none;}
    .ai-status{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(78,205,196,0.08);border:1px solid rgba(78,205,196,0.2);border-radius:var(--radius-sm);}
    .ai-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0;}
    .ai-dot.loading{animation:pulse 1s infinite;background:var(--warn);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .ai-label{font-size:12px;font-weight:600;}
    .ai-label.loading{color:var(--warn);}
    .ai-label.done{color:var(--success);}
    .exercise-list{display:flex;flex-direction:column;gap:8px;}
    .exercise-item{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:flex-start;gap:10px;}
    .ex-num{width:24px;height:24px;border-radius:50%;background:rgba(124,107,255,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:3px;}
    .ex-body{flex:1;display:flex;flex-direction:column;gap:7px;}
    .ex-name-input{font-size:13px;font-weight:600;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);width:100%;padding:2px 0;outline:none;}
    .ex-name-input:focus{border-color:var(--accent);}
    .ex-vals{display:flex;gap:6px;align-items:center;}
    .ex-val-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
    .ex-val-label{font-size:9px;color:var(--text2);}
    .ex-val-input{width:52px;font-size:13px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);text-align:center;padding:5px 4px;outline:none;}
    .ex-val-input:focus{border-color:var(--accent);}
    .ex-sep{font-size:14px;color:var(--text2);margin-top:14px;}
    .ex-del{width:24px;height:24px;border-radius:50%;background:rgba(255,80,80,0.1);border:none;cursor:pointer;color:var(--danger);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;}
    .add-ex-btn{width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;margin-top:4px;}
    .note-input{width:100%;background:rgba(255,209,102,0.06);border:1px solid rgba(255,209,102,0.2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:10px 12px;resize:none;outline:none;font-family:inherit;min-height:64px;}
    .note-input:focus{border-color:var(--warn);}
    .save-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:15px;font-weight:800;cursor:pointer;}
    .save-btn:active{background:#6a5ae0;transform:scale(0.98);}
    .save-btn:disabled{background:var(--bg3);color:var(--text2);}
    .history-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
    .history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .history-member{font-size:14px;font-weight:700;}
    .history-date{font-size:12px;color:var(--text2);}
    .ex-tags{display:flex;gap:6px;flex-wrap:wrap;}
    .ex-tag{font-size:11px;padding:3px 10px;background:rgba(124,107,255,0.1);border-radius:10px;color:var(--accent);font-weight:600;}
    .history-note{font-size:11px;color:var(--warn);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
    .member-header{background:var(--card);border-radius:var(--radius);padding:16px;display:flex;gap:14px;align-items:center;}
    .avatar{width:52px;height:52px;border-radius:50%;background:rgba(124,107,255,0.2);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--accent);flex-shrink:0;}
    .level-badge{display:inline-flex;align-items:center;background:rgba(78,205,196,0.1);border:1px solid rgba(78,205,196,0.25);border-radius:10px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--success);}
    .xp-bar-bg{height:6px;background:var(--bg3);border-radius:10px;overflow:hidden;margin:7px 0 4px;}
    .xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:10px;transition:width 0.8s;}
    .stat-row{display:flex;gap:8px;}
    .stat-card{flex:1;background:var(--bg3);border-radius:var(--radius-sm);padding:12px;text-align:center;}
    .stat-num{font-size:24px;font-weight:800;}
    .stat-label{font-size:10px;color:var(--text2);margin-top:3px;}
    .mission-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
    .mission-row:last-child{border-bottom:none;}
    .m-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
    .m-check.done{background:var(--success);border-color:var(--success);}
    .m-check svg{width:11px;height:11px;stroke:#fff;opacity:0;transition:opacity 0.2s;}
    .m-check.done svg{opacity:1;}
    .m-text{flex:1;font-size:13px;}
    .m-text.done{text-decoration:line-through;color:var(--text2);}
    .m-xp{font-size:12px;font-weight:700;color:var(--accent);}
    .record-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
    .record-row:last-child{border-bottom:none;}
    .record-name{font-size:13px;font-weight:600;}
    .record-val{font-size:12px;color:var(--text2);}
    .record-note{background:rgba(255,209,102,0.08);border-left:3px solid var(--warn);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:8px 12px;margin-top:10px;font-size:12px;color:var(--warn);}
    .member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
    .member-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 10px;text-align:center;cursor:pointer;transition:all 0.2s;}
    .member-card:active{border-color:var(--accent);background:rgba(124,107,255,0.08);}
    .member-card-avatar{width:42px;height:42px;border-radius:50%;background:rgba(124,107,255,0.15);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--accent);margin:0 auto 8px;}
    .member-card-name{font-size:13px;font-weight:600;}
    .bottom-nav{flex-shrink:0;display:flex;background:var(--bg);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;color:var(--text2);font-size:10px;font-weight:600;cursor:pointer;padding:4px 0;transition:color 0.2s;}
    .nav-btn.active{color:var(--accent);}
    .nav-btn svg{width:22px;height:22px;}
    .toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--success);color:#0a1f1e;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;white-space:nowrap;}
    .toast.show{opacity:1;}
    .overlay{position:fixed;inset:0;background:rgba(15,15,19,0.8);display:none;align-items:center;justify-content:center;z-index:200;}
    .overlay.show{display:flex;}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px;line-height:2;}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-title">FitLog</div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('trainer',this)">트레이너</button>
        <button class="mode-btn" onclick="setMode('member',this)">회원</button>
      </div>
    </div>
  </div>

  <div class="screens">
    <!-- 트레이너: 기록 입력 -->
    <div class="screen active" id="screen-input">
      <div class="card">
        <div class="card-title">회원 선택</div>
        <div class="member-chips" id="member-chips"></div>
        <div class="add-member-row">
          <input class="text-input" id="new-member-input" placeholder="새 회원 이름 입력" maxlength="10"
            onkeydown="if(event.key==='Enter')addMember()">
          <button class="btn-sm" onclick="addMember()">추가</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">손글씨 사진 업로드</div>
        <div class="upload-area">
          <input type="file" accept="image/*" capture="environment" id="photo-input" onchange="handlePhoto(event)">
          <div class="upload-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </div>
          <div class="upload-text">카메라로 찍기</div>
          <div class="upload-sub">AI가 손글씨를 자동으로 읽어드려요</div>
        </div>
        <img id="preview-img" class="preview-img">
      </div>

      <div id="ai-section" style="display:none">
        <div class="ai-status">
          <div class="ai-dot loading" id="ai-dot"></div>
          <div class="ai-label loading" id="ai-label">AI가 손글씨를 읽는 중...</div>
        </div>
      </div>

      <div id="result-section" style="display:none;flex-direction:column;gap:12px;">
        <div class="card">
          <div class="card-title">운동 목록 — 수정 가능해요</div>
          <div class="exercise-list" id="exercise-list"></div>
          <button class="add-ex-btn" onclick="addExercise()">+ 운동 추가</button>
        </div>
        <div class="card">
          <div class="card-title">참고사항 (트레이너 메모)</div>
          <textarea class="note-input" id="note-input" placeholder="참고사항을 입력하세요..." rows="2"></textarea>
        </div>
        <button class="save-btn" onclick="saveRecord()">저장하고 회원에게 전송</button>
      </div>
    </div>

    <!-- 트레이너: 기록 보기 -->
    <div class="screen" id="screen-history">
      <div id="history-list" style="display:flex;flex-direction:column;gap:10px;">
        <div class="empty">불러오는 중...</div>
      </div>
    </div>

    <!-- 회원: 회원 선택 -->
    <div class="screen" id="screen-member-select">
      <div class="card">
        <div class="card-title">나는 누구?</div>
        <div class="member-grid" id="member-grid"></div>
      </div>
    </div>

    <!-- 회원: 홈 -->
    <div class="screen" id="screen-member-home">
      <div class="member-header">
        <div class="avatar" id="m-avatar">?</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
            <div style="font-size:17px;font-weight:800" id="m-name">회원님</div>
            <div class="level-badge" id="m-level">Lv.1</div>
          </div>
          <div class="xp-bar-bg"><div class="xp-bar-fill" id="m-xp-fill" style="width:0%"></div></div>
          <div style="font-size:11px;color:var(--text2)" id="m-xp-text">0 / 1000 XP</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-num" style="color:var(--warn)" id="m-streak">0</div><div class="stat-label">일 연속 출석</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--accent)" id="m-total">0</div><div class="stat-label">총 수업 횟수</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--success)" id="m-missions">0</div><div class="stat-label">오늘 완료 미션</div></div>
      </div>
      <div class="card">
        <div class="card-title">오늘의 미션</div>
        <div id="mission-list"></div>
      </div>
      <div class="card" id="latest-card" style="display:none">
        <div class="card-title">최근 수업 기록</div>
        <div id="latest-content"></div>
      </div>
    </div>
  </div>

  <div class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" id="nav-input" onclick="showScreen('input','nav-input')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>기록 입력
    </button>
    <button class="nav-btn" id="nav-history" onclick="showScreen('history','nav-history');loadHistory()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>기록 보기
    </button>
  </div>
</div>

<div class="overlay" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://eeacryaijsbhiajdvgwe.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlYWNyeWFpanNiaGlhamR2Z3dlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTc4NzcsImV4cCI6MjA5MzE5Mzg3N30.ZbNzKnjhNHvCGtwkzEn3MLPzPqX7vSAtqmd7U1MTO4Y';
const sb = supabase.createClient(SB_URL, SB_KEY);

let members = [], selectedMember = null, exercises = [];
let currentMember = null;
let missions = [
  {text:'수업 출석하기',xp:50,done:false},
  {text:'유산소 20분',xp:30,done:false},
  {text:'수분 섭취 기록',xp:20,done:false},
  {text:'스트레칭 10분',xp:20,done:false},
];

async function init() {
  const { data } = await sb.from('members').select('*').order('created_at');
  members = data || [];
  renderChips();
  renderMemberGrid();
}

function renderChips() {
  const el = document.getElementById('member-chips');
  el.innerHTML = '';
  members.forEach(m => {
    const c = document.createElement('button');
    c.className = 'chip' + (selectedMember?.id === m.id ? ' selected' : '');
    c.textContent = m.name;
    c.onclick = () => { selectedMember = m; renderChips(); };
    el.appendChild(c);
  });
}

function renderMemberGrid() {
  const el = document.getElementById('member-grid');
  el.innerHTML = members.length === 0
    ? '<div style="color:var(--text2);font-size:13px;padding:8px 0">아직 등록된 회원이 없어요</div>'
    : '';
  members.forEach(m => {
    const d = document.createElement('div');
    d.className = 'member-card';
    d.innerHTML = `<div class="member-card-avatar">${m.name.slice(0,2)}</div><div class="member-card-name">${m.name}</div>`;
    d.onclick = () => loadMemberHome(m);
    el.appendChild(d);
  });
}

async function addMember() {
  const inp = document.getElementById('new-member-input');
  const name = inp.value.trim();
  if (!name) { showToast('이름을 입력해주세요'); return; }
  if (members.find(m => m.name === name)) { showToast('이미 있는 회원이에요'); return; }
  load(true);
  const { data, error } = await sb.from('members').insert({ name }).select().single();
  load(false);
  if (error) { showToast('추가 실패'); return; }
  members.push(data);
  inp.value = '';
  renderChips();
  renderMemberGrid();
  showToast(name + '님 추가 완료!');
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('preview-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    runAI(ev.target.result);
  };
  reader.readAsDataURL(file);
}

async function runAI(imageData) {
  document.getElementById('ai-section').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('ai-dot').className = 'ai-dot loading';
  const lbl = document.getElementById('ai-label');
  lbl.className = 'ai-label loading';
  lbl.textContent = 'AI가 손글씨를 읽는 중...';

  const base64 = imageData.split(',')[1];
  const mediaType = imageData.split(';')[0].split(':')[1];
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: `손글씨 수업 메모에서 운동 목록과 참고사항만 추출. 동그라미 번호 순서대로.
반드시 JSON만 출력 (다른 텍스트 없이):
{"exercises":[{"name":"운동이름","weight":"무게숫자만","reps":"횟수숫자만","sets":"세트숫자만"}],"note":"참고사항"}
없는 값은 빈 문자열. 단위(kg,회,세트) 제외하고 숫자만.` }
        ]}]
      })
    });
    const d = await res.json();
    const parsed = JSON.parse(d.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    exercises = parsed.exercises || [];
    document.getElementById('note-input').value = parsed.note || '';
  } catch {
    exercises = [{ name:'', weight:'', reps:'', sets:'' }];
    document.getElementById('note-input').value = '';
    showToast('인식 오류 — 직접 입력해주세요');
  }

  lbl.className = 'ai-label done';
  lbl.textContent = '인식 완료! 확인하고 수정하세요';
  document.getElementById('ai-dot').className = 'ai-dot';
  renderExercises();
  document.getElementById('result-section').style.display = 'flex';
}

function renderExercises() {
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  exercises.forEach((ex, i) => {
    const div = document.createElement('div');
    div.className = 'exercise-item';
    div.innerHTML = `
      <div class="ex-num">${i+1}</div>
      <div class="ex-body">
        <input class="ex-name-input" value="${ex.name}" placeholder="운동 이름" oninput="exercises[${i}].name=this.value">
        <div class="ex-vals">
          <div class="ex-val-wrap"><div class="ex-val-label">무게(kg)</div>
            <input class="ex-val-input" value="${ex.weight}" placeholder="-" inputmode="decimal" oninput="exercises[${i}].weight=this.value"></div>
          <span class="ex-sep">×</span>
          <div class="ex-val-wrap"><div class="ex-val-label">횟수</div>
            <input class="ex-val-input" value="${ex.reps}" placeholder="-" inputmode="numeric" oninput="exercises[${i}].reps=this.value"></div>
          <span class="ex-sep">×</span>
          <div class="ex-val-wrap"><div class="ex-val-label">세트</div>
            <input class="ex-val-input" value="${ex.sets}" placeholder="-" inputmode="numeric" oninput="exercises[${i}].sets=this.value"></div>
        </div>
      </div>
      <button class="ex-del" onclick="removeEx(${i})">×</button>`;
    list.appendChild(div);
  });
}

function addExercise() { exercises.push({name:'',weight:'',reps:'',sets:''}); renderExercises(); }
function removeEx(i) { exercises.splice(i,1); renderExercises(); }

async function saveRecord() {
  if (!selectedMember) { showToast('회원을 먼저 선택해주세요'); return; }
  if (!exercises.length) { showToast('운동을 1개 이상 입력해주세요'); return; }
  load(true);
  const note = document.getElementById('note-input').value;
  const { data: rec, error: e1 } = await sb.from('workout_records')
    .insert({ member_id: selectedMember.id, note }).select().single();
  if (e1) { load(false); showToast('저장 실패'); return; }
  const { error: e2 } = await sb.from('exercises').insert(
    exercises.map((ex,i) => ({ record_id: rec.id, order_num: i+1, ...ex }))
  );
  load(false);
  if (e2) { showToast('운동 저장 실패'); return; }
  showToast(selectedMember.name + '님 기록 저장 완료!');
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('ai-section').style.display = 'none';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('photo-input').value = '';
  document.getElementById('note-input').value = '';
  exercises = [];
}

async function loadHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="empty">불러오는 중...</div>';
  const { data } = await sb.from('workout_records')
    .select('*, members(name), exercises(*)')
    .order('recorded_at', { ascending: false }).limit(50);
  if (!data?.length) { el.innerHTML = '<div class="empty">아직 기록이 없어요.<br>수업 후 첫 기록을 남겨보세요!</div>'; return; }
  el.innerHTML = '';
  data.forEach(r => {
    const exs = (r.exercises||[]).sort((a,b)=>a.order_num-b.order_num);
    const tags = exs.slice(0,3).map(e=>`<span class="ex-tag">${e.name}</span>`).join('');
    const more = exs.length>3 ? `<span class="ex-tag">+${exs.length-3}</span>` : '';
    const date = new Date(r.recorded_at).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
    const d = document.createElement('div');
    d.className = 'history-card';
    d.innerHTML = `
      <div class="history-header">
        <div class="history-member">${r.members?.name||'?'}</div>
        <div class="history-date">${date}</div>
      </div>
      <div class="ex-tags">${tags}${more}</div>
      ${r.note?`<div class="history-note">${r.note}</div>`:''}`;
    el.appendChild(d);
  });
}

async function loadMemberHome(member) {
  currentMember = member;
  document.getElementById('m-avatar').textContent = member.name.slice(0,2);
  document.getElementById('m-name').textContent = member.name + '님';
  const { count } = await sb.from('workout_records')
    .select('*',{count:'exact',head:true}).eq('member_id', member.id);
  const total = count || 0;
  const xp = total * 100;
  const level = Math.floor(xp/1000)+1;
  const xpIn = xp % 1000;
  document.getElementById('m-level').textContent = 'Lv.'+level;
  document.getElementById('m-xp-fill').style.width = (xpIn/10)+'%';
  document.getElementById('m-xp-text').textContent = `${xpIn} / 1000 XP`;
  document.getElementById('m-total').textContent = total;
  document.getElementById('m-streak').textContent = Math.min(total,7);

  const { data } = await sb.from('workout_records')
    .select('*,exercises(*)').eq('member_id',member.id)
    .order('recorded_at',{ascending:false}).limit(1).maybeSingle();

  const card = document.getElementById('latest-card');
  if (data) {
    card.style.display = 'block';
    const nums = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨'];
    const exs = (data.exercises||[]).sort((a,b)=>a.order_num-b.order_num);
    document.getElementById('latest-content').innerHTML =
      exs.map((e,i)=>{
        const v=[e.weight?e.weight+'kg':'',e.reps?e.reps+'회':'',e.sets?e.sets+'세트':''].filter(Boolean).join(' × ');
        return `<div class="record-row"><span class="record-name">${nums[i]||i+1} ${e.name}</span><span class="record-val">${v}</span></div>`;
      }).join('') + (data.note?`<div class="record-note">${data.note}</div>`:'');
  } else { card.style.display = 'none'; }

  missions = missions.map(m=>({...m,done:false}));
  renderMissions();
  showScreen('member-home','nav-member');
}

function renderMissions() {
  const el = document.getElementById('mission-list');
  el.innerHTML = '';
  missions.forEach((m,i) => {
    const d = document.createElement('div');
    d.className = 'mission-row';
    d.innerHTML = `
      <div class="m-check ${m.done?'done':''}" onclick="toggleMission(${i})">
        <svg viewBox="0 0 12 12" fill="none" stroke-width="2.5"><polyline points="2,6 5,9 10,3"/></svg>
      </div>
      <span class="m-text ${m.done?'done':''}">${m.text}</span>
      <span class="m-xp">+${m.xp} XP</span>`;
    el.appendChild(d);
  });
  document.getElementById('m-missions').textContent = missions.filter(m=>m.done).length;
}

function toggleMission(i) {
  missions[i].done = !missions[i].done;
  renderMissions();
  if (missions[i].done) showToast('+'+missions[i].xp+' XP 획득!');
}

function setMode(mode, btn) {
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const nav = document.getElementById('bottom-nav');
  if (mode === 'member') {
    nav.innerHTML = `
      <button class="nav-btn active" id="nav-member-select" onclick="showScreen('member-select','nav-member-select')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>회원 선택
      </button>
      <button class="nav-btn" id="nav-member" onclick="currentMember?showScreen('member-home','nav-member'):showToast('회원을 먼저 선택해주세요')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>홈
      </button>`;
    showScreen('member-select','nav-member-select');
  } else {
    nav.innerHTML = `
      <button class="nav-btn active" id="nav-input" onclick="showScreen('input','nav-input')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>기록 입력
      </button>
      <button class="nav-btn" id="nav-history" onclick="showScreen('history','nav-history');loadHistory()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>기록 보기
      </button>`;
    showScreen('input','nav-input');
  }
}

function showScreen(name, navId) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const el = document.getElementById(navId); if(el) el.classList.add('active');
}

function load(show) { document.getElementById('loading').classList.toggle('show',show); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
